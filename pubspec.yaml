name: leak_sentinel
description: >-
  A custom_lint plugin that finds disposal-based memory leaks in Flutter —
  undisposed controllers, uncancelled subscriptions and timers — and fixes
  them with one click.
version: 0.1.0
repository: https://github.com/openforge-oss/leak_sentinel
issue_tracker: https://github.com/openforge-oss/leak_sentinel/issues
topics:
  - lint
  - memory-leak
  - flutter
  - custom-lint
  - static-analysis

environment:
  sdk: ^3.6.0

dependencies:
  analyzer: ">=6.0.0 <10.0.0"
  custom_lint_builder: ^0.8.0

dev_dependencies:
  lints: ">=5.0.0 <7.0.0"
  test: ^1.25.0
