name: Dependency Review

# Blocks pull requests that introduce dependencies with known vulnerabilities or
# malicious-package advisories (via the GitHub Advisory Database), plus
# disallowed licenses. Runs on the diff, so it only judges what a PR adds.
on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
