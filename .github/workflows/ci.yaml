name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build:
    name: Analyze, test & verify rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter --version

      - name: Resolve plugin dependencies
        run: dart pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze plugin
        run: dart analyze lib test --fatal-infos

      - name: Unit tests
        run: dart test

      - name: Resolve example dependencies
        working-directory: example
        run: flutter pub get

      # The real integration gate: runs the plugin against example/lib, whose
      # `// expect_lint:` markers assert each rule fires exactly where intended.
      # A non-zero exit means a rule regressed.
      - name: Verify lint rules fire (expect_lint gate)
        working-directory: example
        run: dart run custom_lint
