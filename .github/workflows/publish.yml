name: Publish to pub.dev

# Publishes automatically when a version tag is pushed (e.g. v0.1.0), using
# pub.dev's OIDC-based automated publishing — no secrets required.
#
# One-time setup on pub.dev (package Admin → Automated publishing):
#   enable "Publishing from GitHub Actions", repository = openforge-oss/leak_sentinel,
#   tag pattern = v{{version}}. The FIRST publish must be done manually
#   (`dart pub publish`) because automated publishing can only be configured
#   once the package exists.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  # Skip publishing when this version is already on pub.dev (e.g. the tag marks a
  # version that was first published manually). Keeps re-tagging idempotent
  # instead of producing a failed "version already exists" run.
  check:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.q.outputs.exists }}
    steps:
      - id: q
        run: |
          VER="${GITHUB_REF_NAME#v}"
          if curl -sfL "https://pub.dev/api/packages/leak_sentinel/versions/${VER}" -o /dev/null; then
            echo "Version ${VER} is already on pub.dev — skipping publish."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${VER} is not on pub.dev — will publish."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: check
    if: needs.check.outputs.exists == 'false'
    permissions:
      id-token: write # required for pub.dev OIDC authentication
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
